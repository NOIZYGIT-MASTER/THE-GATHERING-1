canvas {

#panel-tag { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 6px; font-weight: 700; }

#panel-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.ptag { font-size: 9px; padding: 3px 8px; border-radius: 20px; letter-spacing: 0.5px; text-transform: uppercase; }

#close-panel { position: absolute; top: 12px; right: 14px; background: none; border: none; color: #6366f1; cursor: pointer; font-size: 16px; opacity: 0.5; transition: opacity 0.2s; }
#close-panel:hover { opacity: 1; }

  left: 50%;
  transform: translateX(-50%);

  gap: 8px;

  { from: 'noizylab_brand', to: 'whisper', strength: 1, color: '#fb923c' },
  { from: 'gemma3', to: 'superstack', strength: 1, color: '#fb923c', dash: true },
  { from: 'kokoro', to: 'noizyvox_engine', strength: 1, color: '#fb923c', dash: true },
  { from: 'whisper', to: 'wisdom', strength: 1, color: '#fb923c', dash: true },
  // NOIZYFISH brand to satellites
  { from: 'noizyfish_brand', to: 'fish_community', strength: 2, color: '#f472b6' },
  { from: 'noizyfish_brand', to: 'fish_stream', strength: 2, color: '#f472b6' },
  { from: 'noizyfish_brand', to: 'fish_market', strength: 1, color: '#f472b6' },
  { from: 'noizyfish_brand', to: 'fish_podcast', strength: 1, color: '#f472b6' },
  { from: 'fish_market', to: 'vault', strength: 1, color: '#f472b6', dash: true },
  // Shared infra connections
  { from: 'dreamchamber', to: 'vault', strength: 2, color: '#facc15' },
  { from: 'vault', to: 'never_clauses', strength: 2, color: '#facc15' },
  { from: 'never_clauses', to: 'superstack', strength: 1, color: '#facc15' },
  { from: 'dreamchamber', to: 'rag', strength: 1, color: '#facc15' },
  { from: 'rag', to: 'wisdom', strength: 1, color: '#facc15' },
  { from: 'wisdom', to: 'superstack', strength: 1, color: '#facc15', dash: true },
  // Agent connections
  { from: 'gabriel', to: 'dreamchamber', strength: 1, color: '#818cf8', dash: true },
  { from: 'lucy', to: 'dreamchamber', strength: 1, color: '#818cf8', dash: true },
  { from: 'gabriel', to: 'vault', strength: 1, color: '#818cf8', dash: true },
  { from: 'morrison', to: 'wisdom', strength: 1, color: '#818cf8' },
  { from: 'morrison', to: 'rag', strength: 1, color: '#818cf8', dash: true },
  // Cross-brand connections
  { from: 'noizyvox_brand', to: 'noizylab_brand', strength: 1, color: '#4c1d95', dash: true },
  { from: 'noizykidz_brand', to: 'noizylab_brand', strength: 1, color: '#4c1d95', dash: true },
  { from: 'noizyfish_brand', to: 'noizykidz_brand', strength: 1, color: '#4c1d95', dash: true },
];

// Build lookup
const nodeMap = {};
nodes.forEach(n => { nodeMap[n.id] = n; });

// Stars
const stars = Array.from({length:200}, () => ({
  x: (Math.random() - 0.5) * 3000,
  y: (Math.random() - 0.5) * 2000,
  r: Math.random() * 1.2 + 0.1,
  a: Math.random() * 0.6 + 0.1,
  speed: Math.random() * 0.5 + 0.2,
  phase: Math.random() * Math.PI * 2,
}));

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function worldToScreen(x, y) {
  return {
    sx: W/2 + (x + panX) * zoom,
    sy: H/2 + (y + panY) * zoom,
  };
}

function screenToWorld(sx, sy) {
  return {
    x: (sx - W/2) / zoom - panX,
    y: (sy - H/2) / zoom - panY,
  };
}

let hoveredNode = null;
let selectedNode = null;

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background gradient
  const bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H));
  bg.addColorStop(0, '#060318');
  bg.addColorStop(1, '#020108');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  ctx.save();

  // Stars
  stars.forEach(s => {
    const {sx, sy} = worldToScreen(s.x, s.y);
    const alpha = s.a * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
    ctx.beginPath();
    ctx.arc(sx, sy, s.r * zoom, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fill();
  });

  // Draw connections
  connections.forEach(conn => {
    const from = nodeMap[conn.from];
    const to = nodeMap[conn.to];
    if (!from || !to) return;
    const {sx: x1, sy: y1} = worldToScreen(from.x, from.y);
    const {sx: x2, sy: y2} = worldToScreen(to.x, to.y);
    const rgb = hexToRgb(conn.color);
    const alpha = conn.strength === 3 ? 0.35 : conn.strength === 2 ? 0.2 : 0.1;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = `rgba(${rgb},${alpha})`;
    ctx.lineWidth = (conn.strength === 3 ? 2 : conn.strength === 2 ? 1.2 : 0.8) * Math.min(zoom, 1.5);
    if (conn.dash) ctx.setLineDash([4 * zoom, 8 * zoom]);
    else ctx.setLineDash([]);
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // Sort nodes: brands and hub on top
  const sorted = [...nodes].sort((a,b) => {
    if (a.hub) return 1;
    if (b.hub) return 1;
    if (a.isBrand && !b.isBrand) return 1;
    if (!a.isBrand && b.isBrand) return -1;
    return 0;
  });

  // Draw nodes
  sorted.forEach(n => {
    const {sx, sy} = worldToScreen(n.x, n.y);
    const color = COLORS[n.brand] || '#a78bfa';
    const rgb = hexToRgb(color);
    const r = n.r * zoom;
    const isHovered = hoveredNode === n.id;
    const isSelected = selectedNode === n.id;

    // Pulse for hub and brands
    if (n.hub || n.isBrand) {
      const pulseR = r * (1.6 + 0.3 * Math.sin(t * 1.5 + n.x));
      const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, pulseR);
      grad.addColorStop(0, `rgba(${rgb},0.2)`);
      grad.addColorStop(1, `rgba(${rgb},0)`);
      ctx.beginPath();
      ctx.arc(sx, sy, pulseR, 0, Math.PI*2);
      ctx.fillStyle = grad;
      ctx.fill();
    }

    // Glow
    if (isHovered || isSelected) {
      const glowR = r * 2.5;
      const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, glowR);
      grad.addColorStop(0, `rgba(${rgb},0.35)`);
      grad.addColorStop(1, `rgba(${rgb},0)`);
      ctx.beginPath();
      ctx.arc(sx, sy, glowR, 0, Math.PI*2);
      ctx.fillStyle = grad;
      ctx.fill();
    }

    // Outer ring for brands
    if (n.isBrand) {
      ctx.beginPath();
      ctx.arc(sx, sy, r * 1.4, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(${rgb},0.3)`;
      ctx.lineWidth = 1;
      ctx.setLineDash([3 * zoom, 5 * zoom]);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Hub special rings
    if (n.hub) {
      [1.8, 2.4, 3.2].forEach((mult, i) => {
        ctx.beginPath();
        ctx.arc(sx, sy, r * mult, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(${rgb},${0.15 - i*0.04})`;
        ctx.lineWidth = 0.5;
        ctx.setLineDash([4*zoom, 10*zoom]);
        ctx.stroke();
        ctx.setLineDash([]);
      });
    }

    // Core circle
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI*2);
    const fillGrad = ctx.createRadialGradient(sx - r*0.2, sy - r*0.2, 0, sx, sy, r);
    fillGrad.addColorStop(0, `rgba(${rgb},0.3)`);
    fillGrad.addColorStop(1, `rgba(${rgb},0.08)`);
    ctx.fillStyle = fillGrad;
    ctx.fill();
    ctx.strokeStyle = color;
    ctx.lineWidth = (isHovered || isSelected) ? 2.5 : (n.isBrand || n.hub ? 2 : 1.2);
    ctx.stroke();

    // Labels (only render when zoom is reasonable)
    if (zoom > 0.35) {
      const labelScale = Math.min(zoom, 2);
      ctx.textAlign = 'center';

      // Main label
      ctx.font = `bold ${(n.hub ? 11 : n.isBrand ? 10 : 9) * labelScale}px Courier New`;
      ctx.fillStyle = isHovered || isSelected ? color : `rgba(${rgb},0.9)`;
      ctx.fillText(n.label, sx, sy + 3 * labelScale);

      // Sublabel
      if (zoom > 0.55) {
        ctx.font = `${7 * labelScale}px Courier New`;
        ctx.fillStyle = `rgba(${rgb},0.5)`;
        ctx.fillText(n.sublabel, sx, sy + r + 14 * labelScale);
      }
    }
  });

  ctx.restore();
  t += 0.012;
  requestAnimationFrame(draw);
}

// Hit test
function getNodeAt(mx, my) {
  const {x, y} = screenToWorld(mx, my);
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    const dx = x - n.x, dy = y - n.y;
    if (Math.sqrt(dx*dx + dy*dy) <= n.r * 1.8) return n.id;
  }
  return null;
}

// Show info panel
const panel = document.getElementById('info-panel');
const nodeData = {};
nodes.forEach(n => { nodeData[n.id] = n; });

function showPanel(id) {
  const n = nodeData[id];
  if (!n) return;
  const color = COLORS[n.brand] || '#a78bfa';
  document.getElementById('panel-accent').style.background = `linear-gradient(to right, ${color}, transparent)`;
  document.getElementById('panel-tag').style.color = color;
  document.getElementById('panel-tag').textContent = n.tag;
  document.getElementById('panel-title').style.color = color;
  document.getElementById('panel-title').textContent = n.label;
  document.getElementById('panel-layer').textContent = n.layer;
  document.getElementById('panel-desc').textContent = n.desc;
  const tagsEl = document.getElementById('panel-tags');
  tagsEl.innerHTML = '';
  (n.tags || []).forEach(tag => {
    const span = document.createElement('span');
    span.className = 'ptag';
    span.textContent = tag;
    span.style.background = color + '18';
    span.style.color = color;
    span.style.border = `1px solid ${color}44`;
    tagsEl.appendChild(span);
  });
  panel.classList.add('visible');
  selectedNode = id;
}

// Mouse events
canvas.addEventListener('mousemove', e => {
  hoveredNode = getNodeAt(e.clientX, e.clientY);
  canvas.style.cursor = hoveredNode ? 'pointer' : (dragging ? 'grabbing' : 'grab');
  if (dragging) {
    panX += (e.clientX - lastMX) / zoom;
    panY += (e.clientY - lastMY) / zoom;
    lastMX = e.clientX; lastMY = e.clientY;
  }
});

canvas.addEventListener('mousedown', e => {
  dragging = true;
  lastMX = e.clientX; lastMY = e.clientY;
  canvas.classList.add('dragging');
});

canvas.addEventListener('mouseup', e => {
  if (!dragging || (Math.abs(e.clientX - lastMX) < 3 && Math.abs(e.clientY - lastMY) < 3)) {
    const id = getNodeAt(e.clientX, e.clientY);
    if (id) showPanel(id);
    else { panel.classList.remove('visible'); selectedNode = null; }
  }
  dragging = false;
  canvas.classList.remove('dragging');
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const {x: wx, y: wy} = screenToWorld(e.clientX, e.clientY);
  zoom = Math.max(0.2, Math.min(4, zoom * delta));
  panX = (e.clientX - W/2) / zoom - wx;
  panY = (e.clientY - H/2) / zoom - wy;
}, {passive: false});

document.getElementById('close-panel').onclick = () => {
  panel.classList.remove('visible');
  selectedNode = null;
};

// Focus brand
function focusBrand(brand) {
  const brandNodes = { noizai: {x:0,y:0}, noizyvox: {x:-320,y:-200}, noizykidz: {x:320,y:-200}, noizylab: {x:-320,y:220}, noizyfish: {x:320,y:220} };
  const target = brandNodes[brand];
  if (!target) return;
  // Animate to target
  const targetZoom = brand === 'noizai' ? 1.2 : 1.8;
  const steps = 30;
  let step = 0;
  const startPanX = panX, startPanY = panY, startZoom = zoom;
  function animate() {
    step++;
    const ease = 1 - Math.pow(1 - step/steps, 3);
    panX = startPanX + (-target.x - startPanX) * ease;
    panY = startPanY + (-target.y - startPanY) * ease;
    zoom = startZoom + (targetZoom - startZoom) * ease;
    if (step < steps) requestAnimationFrame(animate);
  }
  animate();
  document.querySelectorAll('.brand-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

// Resize
window.addEventListener('resize', () => {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W; canvas.height = H;
});

draw();
</script>
