<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOIZY.AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #010407;
      cursor: default;
      user-select: none;
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    /* Deep vignette */
    .veil {
      position: fixed; inset: 0; z-index: 2;
      background: radial-gradient(
        ellipse 72% 62% at 50% 54%,
        transparent 0%,
        rgba(1, 4, 7, 0.28) 52%,
        rgba(1, 4, 7, 0.88) 100%
      );
      pointer-events: none;
    }

    /* Camera HUD — top left, barely visible */
    .hud {
      position: fixed;
      top: 2rem; left: 2.2rem;
      z-index: 10;
      font-family: 'Courier New', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      color: rgba(100, 175, 210, 0.22);
      line-height: 1.7;
      pointer-events: none;
    }

    /* Camera HUD — top right */
    .hud-right {
      position: fixed;
      top: 2rem; right: 2.2rem;
      z-index: 10;
      font-family: 'Courier New', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      color: rgba(100, 175, 210, 0.22);
      line-height: 1.7;
      text-align: right;
      pointer-events: none;
    }

    /* Rec indicator */
    .rec {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(200, 60, 60, 0.55);
      margin-right: 6px;
      vertical-align: middle;
      animation: rec-blink 2.8s ease-in-out infinite;
    }
    @keyframes rec-blink {
      0%, 100% { opacity: 0.55; }
      48%       { opacity: 0.55; }
      50%       { opacity: 0.08; }
      52%       { opacity: 0.55; }
    }

    /* The wordmark */
    .wordmark {
      position: fixed;
      z-index: 10;
      bottom: 40%;
      left: 50%;
      transform: translateX(-50%);

      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
      font-size: clamp(2.6rem, 8.5vw, 6.2rem);
      font-weight: 100;
      letter-spacing: 0.6em;
      text-indent: 0.6em;
      text-transform: uppercase;
      white-space: nowrap;

      color: rgba(192, 214, 228, 0.48);
      text-shadow:
        0 0 55px rgba(75, 150, 200, 0.10),
        0 0 130px rgba(35, 95, 155, 0.07),
        0 2px 6px rgba(0, 0, 0, 0.7);

      filter: blur(0.5px);
      animation: word-breathe 16s ease-in-out infinite;
      will-change: transform, opacity, filter;
    }
    @keyframes word-breathe {
      0%   { transform: translateX(-50%) translateY(0);    opacity: 0.48; filter: blur(0.5px); }
      22%  { transform: translateX(-50%) translateY(-9px); opacity: 0.63; filter: blur(0.15px); }
      55%  { transform: translateX(-50%) translateY(6px);  opacity: 0.40; filter: blur(0.75px); }
      78%  { transform: translateX(-50%) translateY(-4px); opacity: 0.58; filter: blur(0.3px); }
      100% { transform: translateX(-50%) translateY(0);    opacity: 0.48; filter: blur(0.5px); }
    }

    /* Tagline */
    .tagline {
      position: fixed;
      z-index: 10;
      bottom: calc(40% - 4.8rem);
      left: 50%;
      transform: translateX(-50%);
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
      font-size: clamp(0.52rem, 1.2vw, 0.74rem);
      font-weight: 300;
      letter-spacing: 0.7em;
      text-indent: 0.7em;
      text-transform: uppercase;
      white-space: nowrap;
      color: rgba(130, 182, 210, 0.26);
      animation: tag-drift 24s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes tag-drift {
      0%   { opacity: 0.26; }
      28%  { opacity: 0.42; }
      60%  { opacity: 0.14; }
      82%  { opacity: 0.36; }
      100% { opacity: 0.26; }
    }

    /* Depth indicator — bottom center */
    .depth-bar {
      position: fixed;
      bottom: 1.8rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-family: 'Courier New', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.4em;
      text-indent: 0.4em;
      color: rgba(100, 175, 210, 0.18);
      pointer-events: none;
    }

    /* Audio prompt — fades away after first click */
    .audio-prompt {
      position: fixed;
      bottom: 3.6rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.5em;
      text-indent: 0.5em;
      text-transform: uppercase;
      color: rgba(120, 175, 210, 0.2);
      white-space: nowrap;
      pointer-events: none;
      transition: opacity 2s ease;
    }
    .audio-prompt.hidden { opacity: 0; }
  </style>
</head>
<body>

<canvas id="c"></canvas>
<div class="veil"></div>

<div class="hud">
  <span class="rec"></span>REC<br>
  <span id="hud-depth">DEPTH  —</span><br>
  <span id="hud-temp">TEMP  —</span>
</div>

<div class="hud-right">
  <span id="hud-time">—</span><br>
  CAM / RSP-01<br>
  NOIZY.AI
</div>

<div class="wordmark">NOIZY.AI</div>
<div class="tagline">something this way comes</div>
<div class="depth-bar" id="depth-bar">— — —</div>
<div class="audio-prompt" id="audio-prompt">tap to submerge</div>

<script>
(function () {
  'use strict';

  // ── Canvas setup ────────────────────────────────────────────────────────
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  let W, H, t = 0;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // ── Web Audio (starts on first interaction) ────────────────────────────
  let audioStarted = false;
  let ac, droneGain, noiseGain;

  function startAudio() {
    if (audioStarted) return;
    audioStarted = true;
    document.getElementById('audio-prompt').classList.add('hidden');

    try {
      ac = new (window.AudioContext || window.webkitAudioContext)();

      // Master gain
      const master = ac.createGain();
      master.gain.value = 0.0;
      master.connect(ac.destination);

      // Fade master in over 6 seconds
      master.gain.linearRampToValueAtTime(1.0, ac.currentTime + 6);

      // ── Deep drone (55 Hz — very low, like the ocean's heartbeat) ──
      const droneOsc = ac.createOscillator();
      droneOsc.type = 'sine';
      droneOsc.frequency.value = 55;

      // Harmonic overtone — adds richness
      const overtoneOsc = ac.createOscillator();
      overtoneOsc.type = 'sine';
      overtoneOsc.frequency.value = 110;

      droneGain = ac.createGain();
      droneGain.gain.value = 0.035;

      const overtoneGain = ac.createGain();
      overtoneGain.gain.value = 0.012;

      // Slow tremolo on the drone (0.05 Hz — barely breathing)
      const tremoloOsc = ac.createOscillator();
      tremoloOsc.frequency.value = 0.05;
      const tremoloGain = ac.createGain();
      tremoloGain.gain.value = 0.008;
      tremoloOsc.connect(tremoloGain);
      tremoloGain.connect(droneGain.gain);
      tremoloOsc.start();

      droneOsc.connect(droneGain);
      droneGain.connect(master);
      overtoneOsc.connect(overtoneGain);
      overtoneGain.connect(master);
      droneOsc.start();
      overtoneOsc.start();

      // ── Underwater filtered noise ──
      const bufLen   = 4 * ac.sampleRate;
      const noiseBuf = ac.createBuffer(1, bufLen, ac.sampleRate);
      const data     = noiseBuf.getChannelData(0);
      for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;

      const noiseSource = ac.createBufferSource();
      noiseSource.buffer = noiseBuf;
      noiseSource.loop   = true;

      // Low-pass filter — only the deep gurgling frequencies
      const lpf = ac.createBiquadFilter();
      lpf.type            = 'lowpass';
      lpf.frequency.value = 180;
      lpf.Q.value         = 1.8;

      noiseGain = ac.createGain();
      noiseGain.gain.value = 0.018;

      noiseSource.connect(lpf);
      lpf.connect(noiseGain);
      noiseGain.connect(master);
      noiseSource.start();

    } catch (e) {
      // Audio not available — silent is fine
    }
  }

  document.addEventListener('click',     startAudio);
  document.addEventListener('touchstart', startAudio);

  // ── HUD clock ──────────────────────────────────────────────────────────
  function updateHUD() {
    const now = new Date();
    const hh  = String(now.getUTCHours()).padStart(2, '0');
    const mm  = String(now.getUTCMinutes()).padStart(2, '0');
    const ss  = String(now.getUTCSeconds()).padStart(2, '0');
    document.getElementById('hud-time').textContent = `${hh}:${mm}:${ss} UTC`;
  }
  setInterval(updateHUD, 1000);
  updateHUD();

  // Slowly incrementing depth (purely atmospheric)
  let apparentDepth = 12.4;
  let apparentTemp  = 4.2;
  setInterval(() => {
    apparentDepth += (Math.random() - 0.47) * 0.08;
    apparentTemp  += (Math.random() - 0.5)  * 0.04;
    apparentDepth  = Math.max(8, Math.min(22, apparentDepth));
    apparentTemp   = Math.max(2.8, Math.min(6.1, apparentTemp));
    document.getElementById('hud-depth').textContent =
      `DEPTH  ${apparentDepth.toFixed(1)}m`;
    document.getElementById('hud-temp').textContent =
      `TEMP   ${apparentTemp.toFixed(1)}°C`;
    document.getElementById('depth-bar').textContent =
      `${apparentDepth.toFixed(1)}m  ·  ${apparentTemp.toFixed(1)}°C  ·  CAM/01`;
  }, 3000);

  // ── Water layers ────────────────────────────────────────────────────────
  const layers = [
    { ny:0.20, amp:0.011, freq:0.62, sp:0.14, r:16, g:50, b:80, a:0.042 },
    { ny:0.38, amp:0.019, freq:0.46, sp:0.09, r:12, g:40, b:68, a:0.036 },
    { ny:0.54, amp:0.008, freq:1.02, sp:0.19, r: 9, g:32, b:56, a:0.030 },
    { ny:0.69, amp:0.024, freq:0.30, sp:0.07, r: 7, g:24, b:46, a:0.026 },
    { ny:0.81, amp:0.013, freq:0.78, sp:0.16, r: 5, g:17, b:34, a:0.023 },
    { ny:0.91, amp:0.030, freq:0.22, sp:0.05, r: 3, g:11, b:24, a:0.020 },
  ];

  // ── Caustics ────────────────────────────────────────────────────────────
  const caustics = Array.from({ length: 26 }, () => ({
    nx:  Math.random(),
    ny:  0.08 + Math.random() * 0.85,
    nr:  0.038 + Math.random() * 0.15,
    dxf: 0.00014 + Math.random() * 0.00028,
    dyf: 0.00010 + Math.random() * 0.00022,
    ph:  Math.random() * Math.PI * 2,
    phY: Math.random() * Math.PI * 2,
    it:  0.011 + Math.random() * 0.020,
    as:  0.42  + Math.random() * 0.52,
    rs:  (Math.random() - 0.5) * 0.0004,
    rot: Math.random() * Math.PI,
  }));

  // ── Bioluminescent sparks ────────────────────────────────────────────────
  // Brief flashes of cold blue-green light — deep sea organisms
  const bioLights = Array.from({ length: 14 }, () => ({
    nx:     Math.random(),
    ny:     0.3 + Math.random() * 0.65,
    phase:  Math.random() * Math.PI * 2,
    period: 8 + Math.random() * 20,   // seconds between flashes
    dur:    0.6 + Math.random() * 1.4, // seconds lit
    r:      1.2 + Math.random() * 2.8,
    hue:    170 + Math.random() * 40,  // cyan-green-teal range
  }));

  // ── Motes ───────────────────────────────────────────────────────────────
  const motes = Array.from({ length: 100 }, () => ({
    nx:    Math.random(),
    ny:    Math.random(),
    r:     0.3 + Math.random() * 1.5,
    rise:  0.00003 + Math.random() * 0.00011,
    drift: (Math.random() - 0.5) * 0.00011,
    ph:    Math.random() * Math.PI * 2,
    op:    0.07 + Math.random() * 0.26,
  }));

  // ── The Presence ────────────────────────────────────────────────────────
  // A large shape that moves through the deep. You feel it more than see it.
  const presence = {
    state:    'waiting',  // waiting | appearing | crossing | fading
    nx:       -0.3,       // normalized x (starts off-screen left)
    ny:       0.58,       // normalized y (middle depth)
    opacity:  0,
    nextTime: 35 + Math.random() * 25,  // seconds before first appearance
    elapsed:  0,
    dir:      1,          // 1 = left→right, -1 = right→left
    crossDur: 28,         // seconds to cross the screen
    crossT:   0,
    // Shape (large, vague — not a specific creature)
    nw: 0.32,
    nh: 0.055,
  };

  // ── Color temperature shift ──────────────────────────────────────────────
  // Very slowly shifts the overall water color — blue → teal → blue
  let colorCycle = 0;

  // ── Draw ────────────────────────────────────────────────────────────────
  const dt = 1 / 60; // assume 60fps for presence timing

  function draw() {
    t += 0.007;
    colorCycle += 0.0003;
    presence.elapsed += dt;

    // ── Background ──
    const tealShift = 0.5 + 0.5 * Math.sin(colorCycle);
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0.00, `rgb(1,4,${Math.round(7 + tealShift * 3)})`);
    bg.addColorStop(0.35, `rgb(2,${Math.round(10 + tealShift * 5)},${Math.round(18 + tealShift * 4)})`);
    bg.addColorStop(0.72, `rgb(2,9,14)`);
    bg.addColorStop(1.00, 'rgb(1,4,8)');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // ── Water layers ──
    layers.forEach(l => {
      const yBase = H * l.ny;
      const amp   = H * l.amp;
      ctx.beginPath();
      for (let x = 0; x <= W; x += 5) {
        const y = yBase
          + Math.sin(x * l.freq * 0.009 +  t * l.sp)          * amp
          + Math.sin(x * l.freq * 0.014 -  t * l.sp * 0.66)   * amp * 0.44
          + Math.sin(x * l.freq * 0.004 +  t * l.sp * 0.31)   * amp * 0.28;
        if (x === 0) ctx.moveTo(x, y);
        else         ctx.lineTo(x, y);
      }
      ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
      ctx.fillStyle = `rgba(${l.r},${l.g},${l.b},${l.a})`;
      ctx.fill();
    });

    // ── The Presence ──────────────────────────────────────────────────────
    // State machine: waiting → appearing → crossing → fading → waiting
    if (presence.state === 'waiting' && presence.elapsed >= presence.nextTime) {
      presence.state   = 'appearing';
      presence.crossT  = 0;
      presence.dir     = Math.random() < 0.5 ? 1 : -1;
      presence.nx      = presence.dir === 1 ? -0.35 : 1.35;
      presence.ny      = 0.42 + Math.random() * 0.28;
      presence.nw      = 0.28 + Math.random() * 0.18;
      presence.nh      = 0.04 + Math.random() * 0.04;
      presence.crossDur= 22 + Math.random() * 16;
    }

    if (presence.state === 'appearing') {
      presence.opacity = Math.min(presence.opacity + dt * 0.018, 0.11);
      if (presence.opacity >= 0.10) presence.state = 'crossing';
    }

    if (presence.state === 'crossing') {
      presence.crossT += dt;
      const prog = presence.crossT / presence.crossDur;
      presence.nx += presence.dir * dt / presence.crossDur;
      // subtle vertical undulation while crossing
      presence.ny += Math.sin(t * 0.3) * 0.00015;
      // fade slightly in middle, more visible at edges
      const centrality = 1 - Math.abs(presence.nx - 0.5) * 2;
      presence.opacity = 0.07 + centrality * 0.05;

      if (prog >= 0.85) presence.state = 'fading';
    }

    if (presence.state === 'fading') {
      presence.opacity = Math.max(presence.opacity - dt * 0.012, 0);
      presence.nx      += presence.dir * dt / presence.crossDur;
      if (presence.opacity <= 0) {
        presence.state   = 'waiting';
        presence.elapsed = 0;
        presence.nextTime= 40 + Math.random() * 30;
        presence.opacity = 0;
      }
    }

    if (presence.opacity > 0.002) {
      const px = W * presence.nx;
      const py = H * presence.ny;
      const pw = W * presence.nw;
      const ph = H * presence.nh;

      // The shadow — darker than the surrounding water
      const presGrad = ctx.createRadialGradient(px, py, 0, px, py, pw);
      presGrad.addColorStop(0.00, `rgba(0, 3, 6, ${presence.opacity * 0.9})`);
      presGrad.addColorStop(0.30, `rgba(0, 4, 8, ${presence.opacity * 0.5})`);
      presGrad.addColorStop(0.65, `rgba(1, 6, 12, ${presence.opacity * 0.18})`);
      presGrad.addColorStop(1.00, 'rgba(0,0,0,0)');

      // Displacement shimmer around the presence (bioluminescent edge)
      const shim = ctx.createRadialGradient(px, py, pw * 0.55, px, py, pw * 0.72);
      shim.addColorStop(0,   'rgba(0,0,0,0)');
      shim.addColorStop(0.5, `rgba(50, 140, 180, ${presence.opacity * 0.12})`);
      shim.addColorStop(1,   'rgba(0,0,0,0)');

      ctx.save();
      ctx.translate(px, py);
      ctx.beginPath();
      ctx.ellipse(0, 0, pw, ph, Math.PI * 0.04 * presence.dir, 0, Math.PI * 2);
      ctx.fillStyle = presGrad;
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(0, 0, pw * 1.1, ph * 1.6, Math.PI * 0.04 * presence.dir, 0, Math.PI * 2);
      ctx.fillStyle = shim;
      ctx.fill();
      ctx.restore();
    }

    // ── Caustics ──
    caustics.forEach(c => {
      const x     = W * (c.nx + Math.sin(t * c.dxf * 1800 + c.ph ) * 0.045);
      const y     = H * (c.ny + Math.cos(t * c.dyf * 1400 + c.phY) * 0.065);
      const rBase = Math.min(W, H) * c.nr;
      c.rot += c.rs;
      const pulse = 0.62 + 0.38 * Math.sin(t * 0.52 + c.ph);
      const ri = rBase * (1 + 0.18 * Math.sin(t * 0.36 + c.ph));
      const rj = rBase * c.as  * (1 + 0.14 * Math.cos(t * 0.27 + c.phY));

      const grad = ctx.createRadialGradient(x, y, 0, x, y, Math.max(ri, rj));
      grad.addColorStop(0.00, `rgba(88, 168, 215, ${c.it * pulse})`);
      grad.addColorStop(0.38, `rgba(50, 122, 175, ${c.it * 0.36 * pulse})`);
      grad.addColorStop(0.72, `rgba(22,  76, 132, ${c.it * 0.10 * pulse})`);
      grad.addColorStop(1.00, 'rgba(0,0,0,0)');

      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(c.rot);
      ctx.beginPath();
      ctx.ellipse(0, 0, ri, rj, 0, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.restore();
    });

    // ── Bioluminescent flashes ──
    bioLights.forEach(b => {
      const cyclePos = (t * (1 / b.period)) % 1;
      const flashDur = b.dur / b.period;
      let bioAlpha = 0;
      if (cyclePos < flashDur) {
        // Flash envelope: quick rise, slow fade
        const env = cyclePos / flashDur;
        bioAlpha = (env < 0.2)
          ? env / 0.2
          : 1 - (env - 0.2) / 0.8;
        bioAlpha *= 0.55;
      }

      if (bioAlpha > 0.01) {
        // Drift slowly
        const x = W * (b.nx + Math.sin(t * 0.08 + b.phase) * 0.015);
        const y = H * (b.ny + Math.cos(t * 0.06 + b.phase) * 0.018);
        const grad = ctx.createRadialGradient(x, y, 0, x, y, b.r * 4);
        grad.addColorStop(0,    `hsla(${b.hue}, 85%, 72%, ${bioAlpha})`);
        grad.addColorStop(0.35, `hsla(${b.hue}, 80%, 55%, ${bioAlpha * 0.3})`);
        grad.addColorStop(1,    'rgba(0,0,0,0)');
        ctx.beginPath();
        ctx.arc(x, y, b.r * 4, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
        // Core bright point
        ctx.beginPath();
        ctx.arc(x, y, b.r * 0.6, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${b.hue}, 90%, 88%, ${bioAlpha * 0.9})`;
        ctx.fill();
      }
    });

    // ── Motes ──
    motes.forEach(m => {
      m.ny -= m.rise;
      m.nx += m.drift + Math.sin(t * 0.44 + m.ph) * 0.00007;
      if (m.ny < -0.02) { m.ny = 1.02; m.nx = Math.random(); }
      if (m.nx <  -0.02)  m.nx = 1.02;
      if (m.nx >   1.02)  m.nx = -0.02;
      const a = m.op * (0.42 + 0.58 * Math.sin(t * 0.88 + m.ph));
      ctx.beginPath();
      ctx.arc(m.nx * W, m.ny * H, m.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(158, 208, 235, ${a})`;
      ctx.fill();
    });

    // ── Edge darkening ──
    const vig = ctx.createRadialGradient(W*.5, H*.53, H*.14, W*.5, H*.53, H*.96);
    vig.addColorStop(0.00, 'rgba(0,0,0,0)');
    vig.addColorStop(0.62, 'rgba(1,4,8,0.22)');
    vig.addColorStop(1.00, 'rgba(1,3,7,0.82)');
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, W, H);

    // ── Bottom fade to abyss ──
    const abyss = ctx.createLinearGradient(0, H * 0.72, 0, H);
    abyss.addColorStop(0, 'rgba(0,0,0,0)');
    abyss.addColorStop(1, 'rgba(0,2,4,0.55)');
    ctx.fillStyle = abyss;
    ctx.fillRect(0, H * 0.72, W, H * 0.28);

    requestAnimationFrame(draw);
  }

  draw();
})();
</script>

</body>
</html>
