<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOIZY.AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  canvas {
    position: fixed;
    inset: 0;
    display: block;
  }

  /* Text lives DEEP in the water — lower third */
  .content {
    position: fixed;
    bottom: 12%;
    left: 0;
    right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 10;
    pointer-events: none;
    gap: 18px;
  }

  .logo {
    font-family: 'Georgia', serif;
    font-size: clamp(42px, 9vw, 110px);
    font-weight: 400;
    font-style: italic;
    color: rgba(165, 172, 178, 0.13);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    animation: float-deep 16s ease-in-out infinite,
               shimmer 9s ease-in-out infinite;
    text-shadow:
      0 0 60px rgba(130, 160, 180, 0.06),
      0 0 120px rgba(100, 140, 170, 0.04),
      0 4px 8px rgba(0,0,0,0.9);
    filter: blur(0.8px);
  }

  .line1 {
    font-family: 'Georgia', serif;
    font-size: clamp(9px, 1.2vw, 14px);
    font-style: italic;
    letter-spacing: 0.5em;
    color: rgba(145, 158, 168, 0.09);
    text-transform: lowercase;
    animation: float-deep 20s ease-in-out infinite reverse,
               shimmer 12s ease-in-out infinite 1.5s;
    filter: blur(0.6px);
  }

  .line2 {
    font-family: 'Georgia', serif;
    font-size: clamp(8px, 1vw, 12px);
    font-style: italic;
    letter-spacing: 0.4em;
    color: rgba(130, 145, 155, 0.07);
    text-transform: lowercase;
    animation: float-deep 24s ease-in-out infinite,
               shimmer 15s ease-in-out infinite 3s;
    filter: blur(0.7px);
  }

  @keyframes float-deep {
    0%   { transform: translateY(0px)   translateX(0px); }
    20%  { transform: translateY(-6px)  translateX(3px); }
    45%  { transform: translateY(-10px) translateX(-2px); }
    70%  { transform: translateY(-5px)  translateX(4px); }
    100% { transform: translateY(0px)   translateX(0px); }
  }

  @keyframes shimmer {
    0%, 100% { opacity: 1; }
    35%       { opacity: 0.55; }
    65%       { opacity: 0.8; }
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="content">
  <div class="logo">NOIZY.AI</div>
  <div class="line1">something this way comes</div>
  <div class="line2">i believe it will change the world</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, t = 0;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ── Water wave config ─────────────────────────────────────────
// Many thin layers stacked — gives illusion of depth & volume
const NUM_LAYERS = 14;
const waveDefs = Array.from({ length: NUM_LAYERS }, (_, i) => ({
  yRatio:  0.05 + i * 0.072,          // distributes from top to lower half
  amp1:    10 + Math.random() * 22,
  amp2:    6  + Math.random() * 12,
  freq1:   0.0005 + Math.random() * 0.0008,
  freq2:   0.0003 + Math.random() * 0.0005,
  phase1:  Math.random() * Math.PI * 2,
  phase2:  Math.random() * Math.PI * 2,
  speed1:  0.00012 + Math.random() * 0.00010,
  speed2:  0.00008 + Math.random() * 0.00007,
  // Deeper layers = slightly lighter teal, more opaque
  alpha:   0.018 + i * 0.009,
  hue:     196 + i * 2,
  sat:     16  + i * 2,
  lum:     5   + i * 1.6
}));

// ── Caustic shimmer ─────────────────────────────────────────
const caustics = Array.from({ length: 18 }, (_, i) => ({
  xSeed: Math.random(),
  ySeed: Math.random() * 0.55,        // caustics in upper portion = surface above
  rBase: 40 + Math.random() * 60,
  sp1:   0.00025 + Math.random() * 0.00015,
  sp2:   0.00018 + Math.random() * 0.00012,
  ph:    Math.random() * Math.PI * 2,
  aBase: 0.008 + Math.random() * 0.010
}));

// ── Floating motes (sediment / particles) ───────────────────
const motes = Array.from({ length: 45 }, () => ({
  x:  Math.random(),
  y:  Math.random(),
  r:  0.4 + Math.random() * 1.4,
  vx: (Math.random() - 0.5) * 0.000025,
  vy: -0.000012 - Math.random() * 0.000008,
  wph: Math.random() * Math.PI * 2,
  wsp: 0.0002 + Math.random() * 0.0002,
  a:  0.025 + Math.random() * 0.05
}));

// ── Helpers ────────────────────────────────────────────────
function waveY(def, time) {
  return H * def.yRatio
    + Math.sin(time * def.speed1 * 1000 + def.phase1) * def.amp1
    + Math.sin(time * def.speed2 * 1000 + def.phase2) * def.amp2;
}

function drawWaveLayer(def, time) {
  const SEGS = 60;
  ctx.beginPath();
  ctx.moveTo(0, H);

  const y0 = waveY(def, time);
  ctx.lineTo(0, y0);

  for (let s = 1; s <= SEGS; s++) {
    const px = (s / SEGS) * W;
    // Per-segment variation for organic look
    const py = H * def.yRatio
      + Math.sin(time * def.speed1 * 1000 + def.phase1 + s * 0.35) * def.amp1
      + Math.sin(time * def.speed2 * 1000 + def.phase2 + s * 0.22) * def.amp2;
    ctx.lineTo(px, py);
  }

  ctx.lineTo(W, H);
  ctx.closePath();

  ctx.fillStyle =
    `hsla(${def.hue},${def.sat}%,${def.lum}%,${def.alpha})`;
  ctx.fill();
}

function drawCaustics(time) {
  caustics.forEach(c => {
    const x = (Math.sin(time * c.sp1 + c.ph)       * 0.35 + c.xSeed) * W;
    const y = (Math.cos(time * c.sp2 + c.ph * 1.3) * 0.15 + c.ySeed) * H;
    const r = c.rBase + Math.sin(time * 0.0004 + c.ph) * 20;
    const a = c.aBase + Math.sin(time * 0.0006 + c.ph) * 0.005;

    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, `rgba(160,210,230,${a})`);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
  });
}

function drawMotes(time) {
  motes.forEach(m => {
    m.x += m.vx + Math.sin(time * m.wsp + m.wph) * 0.000018;
    m.y += m.vy;
    if (m.y < -0.02) m.y = 1.02;
    if (m.x <  0)    m.x = 1;
    if (m.x >  1)    m.x = 0;

    ctx.beginPath();
    ctx.arc(m.x * W, m.y * H, m.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180,200,215,${m.a})`;
    ctx.fill();
  });
}

// ── Render loop ────────────────────────────────────────────
function draw(ts) {
  t = ts * 0.001; // seconds

  // Deep ocean background
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0,    '#010305');
  bg.addColorStop(0.35, '#020810');
  bg.addColorStop(0.7,  '#030c14');
  bg.addColorStop(1,    '#010508');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Surface caustic light — upper region only
  drawCaustics(ts);

  // Water layers — dense stack from top down
  waveDefs.forEach(d => drawWaveLayer(d, ts));

  // Suspended particles
  drawMotes(ts);

  // Heavy vignette — pulls edges into black, isolates the deep
  const vig = ctx.createRadialGradient(W/2, H/2, H * 0.25, W/2, H/2, H * 0.9);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.72)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);

  // Extra darkness at very bottom — text lives just above this
  const floor = ctx.createLinearGradient(0, H * 0.75, 0, H);
  floor.addColorStop(0, 'rgba(0,0,0,0)');
  floor.addColorStop(1, 'rgba(0,0,0,0.6)');
  ctx.fillStyle = floor;
  ctx.fillRect(0, H * 0.75, W, H * 0.25);

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
