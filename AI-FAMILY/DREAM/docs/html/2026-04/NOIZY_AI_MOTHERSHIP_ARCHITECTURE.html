  .sidebar-header .subtitle { font-size: 11px; color: var(--text-dim); margin-top: 4px; letter-spacing: 0.5px; }

  .badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge-live { background: rgba(16,185,129,0.15); color: var(--accent-green); }
  .badge-pending { background: rgba(245,158,11,0.15); color: var(--accent-amber); }
  .badge-planned { background: rgba(59,130,246,0.15); color: var(--accent-blue); }
  .badge-dead { background: rgba(239,68,68,0.15); color: var(--accent-red); }

  th { text-align: left; padding: 8px 12px; font-weight: 600; color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
  td { padding: 8px 12px; border-bottom: 1px solid rgba(42,45,62,0.5); color: var(--text-secondary); }
  tr:hover td { background: var(--bg-hover); }

  .stat-value { font-size: 28px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

  .tree .folder { color: var(--accent-blue); font-weight: 600; }
  .tree .file { color: var(--text-secondary); }
  .tree .comment { color: var(--text-dim); }

  .domain-icon { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; flex-shrink: 0; }
