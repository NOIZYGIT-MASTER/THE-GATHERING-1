    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      com.noizy.empire: "true"
      com.noizy.service: "agent-lucy"
      com.noizy.tier: "agent"
      com.noizy.role: "session-tracker"
    volumes:
      - shared-logs:/var/log/noizy

  # ── Agent: Shirley (code + file manager) ───────────────────────────────────
  agent-shirley:
