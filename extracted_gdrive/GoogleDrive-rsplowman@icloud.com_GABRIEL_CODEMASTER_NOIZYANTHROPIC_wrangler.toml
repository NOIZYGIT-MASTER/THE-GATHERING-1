name               = "heaven"
main               = "src/index.js"                      # placeholder — real entry is index.ts in noizy-heaven
compatibility_date = "2026-04-17"
compatibility_flags = ["nodejs_compat"]
account_id         = "5f36aa9795348ea681d0b21910dfc82a"  # rsp@noizy.ai account

# ── NOIZY 2036 · Cron Triggers ────────────────────────────────────────────────
# Hourly self-healing reconciliation — diffs live CF state against
# NOIZY_2036_STATE (declared in src/index.js) and corrects drift.
# Runs at the edge globally. Handler: scheduled(event, env, ctx) in index.js.
[triggers]
crons = ["0 * * * *"]

# ── D1 (NOIZYLAB local dev sessions only) ─────────────────────────────────────
[[d1_databases]]
binding       = "DB_MEMORY"
database_name = "agent-memory"
database_id   = "b5b58cc9-1f37-4000-adc5-12f9e419662f"  # LIVE — confirmed via GABRIEL memcell pull 2026-04-16

[[d1_databases]]
binding       = "DB_REPAIRS"
database_name = "noizy-prod"
database_id   = "cd6cae46-e5cd-42b6-a97a-5d0e576c1c2a"

