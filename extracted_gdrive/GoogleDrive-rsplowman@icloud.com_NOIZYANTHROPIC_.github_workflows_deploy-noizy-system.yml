name: NOIZY Deploy System (Manual Dispatch)

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Run ID (from NOIZYBEAST or n8n)"
        required: true
      actor:
        description: "Actor identity"
        required: true
        default: "RSP001"
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

concurrency:
  group: noizy-dispatch-${{ github.event.inputs.environment }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'

jobs:
  validate-inputs:
    name: Validate Inputs
    runs-on: ubuntu-latest
    steps:
      - name: Validate run_id and actor
        run: |
          if ! echo "${{ github.event.inputs.run_id }}" | grep -qE '^[a-zA-Z0-9_-]{1,64}$'; then
            echo "ERROR: Invalid run_id format"
            exit 1
          fi
          if ! echo "${{ github.event.inputs.actor }}" | grep -qE '^[a-zA-Z0-9_-]{1,32}$'; then
            echo "ERROR: Invalid actor format"
            exit 1
          fi

  constitutional-check:
    name: Constitutional Gate
    needs: validate-inputs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify royalty floor
        run: |
          if grep -rn "royalty_split.*0\.[0-6][0-9]" --include="*.ts" --include="*.js" --include="*.json" \
             --exclude-dir=node_modules . 2>/dev/null; then
            echo "ERROR: Royalty split below founding floor detected"
            exit 1
          fi
          echo "Royalty floor verified: 0.75 minimum enforced"

  deploy:
    name: Deploy (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest
    needs: constitutional-check
    environment: ${{ github.event.inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Deploy noisyvox
        working-directory: NOIZYLAB/noisyvox
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npm ci --prefer-offline || npm install
          npx wrangler deploy ${{ github.event.inputs.environment == 'staging' && '--env staging' || '' }}

      - name: Deploy noizyproof
        working-directory: apps/noizyproof
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npm ci --prefer-offline || npm install
          npx wrangler deploy ${{ github.event.inputs.environment == 'staging' && '--env staging' || '' }}

      - name: Deploy marker
        run: |
          echo "RUN_ID=${{ github.event.inputs.run_id }}"
          echo "ACTOR=${{ github.event.inputs.actor }}"
          echo "ENV=${{ github.event.inputs.environment }}"
          echo "SHA=${{ github.sha }}"
          echo "DEPLOYED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Notify GABRIEL
        if: env.GABRIEL_WEBHOOK_URL != ''
        env:
          GABRIEL_WEBHOOK_URL: ${{ secrets.GABRIEL_WEBHOOK_URL }}
        run: |
          curl -s -X POST "${GABRIEL_WEBHOOK_URL}/memcell/last_dispatch_deploy" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.GABRIEL_API_KEY }}" \
            -d "{\"value\":\"{\\\"run_id\\\":\\\"${{ github.event.inputs.run_id }}\\\",\\\"actor\\\":\\\"${{ github.event.inputs.actor }}\\\",\\\"env\\\":\\\"${{ github.event.inputs.environment }}\\\",\\\"sha\\\":\\\"${{ github.sha }}\\\"}\",\"category\":\"deployment\"}" || true
