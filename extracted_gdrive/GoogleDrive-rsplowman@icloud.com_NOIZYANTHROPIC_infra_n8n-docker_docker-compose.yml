# NOIZY n8n — Trusted Internal Automation
# Usage: cd n8n-docker && docker compose up -d
# Permanent fix stack (2026-04-19):
#   - Docker native healthcheck (Docker restarts unhealthy containers on its own)
#   - restart: unless-stopped on both services
#   - depends_on: service_healthy for clean boot order
#   - Paired with ai.noizy.n8n-guardian LaunchAgent for wake-event recovery

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: noizy-n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
      - ./workflows:/home/node/workflows
    environment:
      - N8N_PUBLIC_API_ENABLED=true
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=noizy
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-noizy2026}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-n8npass}
      - WEBHOOK_URL=https://n8n-internal.noizy.ai
      - GENERIC_TIMEZONE=America/Toronto
      - TZ=America/Toronto
      # Disable internal task runner — its JWT broker requires tight clock sync
      # that macOS Docker Desktop VM can't maintain across wake/sleep cycles.
      # Workflows still execute; only the separate runner process is gone.
      - N8N_RUNNERS_ENABLED=false
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    stop_grace_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: noizy-n8n-postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=n8n
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-n8npass}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  n8n-data:
  postgres-data:
