[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "supersonic"
version = "1.0.0"
description = "Audio Intelligence System for NOIZY.AI — Scans, classifies, fingerprints, and catalogs every sound in the universe."
readme = "README.md"
license = {text = "Proprietary — NOIZYFISH INC."}
requires-python = ">=3.11"
authors = [
    {name = "Robert Stephen Plowman", email = "rsp@noizyfish.com"},
]

dependencies = [
    "click>=8.0",
    "rich>=13.0",
    "pydantic>=2.0",
    "mutagen>=1.47",
    "librosa>=0.10",
    "soundfile>=0.12",
    "numpy>=1.24",
    "pyacoustid>=1.3",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov",
]

[project.scripts]
supersonic = "supersonic.cli:cli"

[tool.setuptools.packages.find]
include = ["supersonic*"]
