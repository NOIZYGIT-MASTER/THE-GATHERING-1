name                 = "heaven"
main                 = "src/index.ts"
compatibility_date   = "2026-04-17"
compatibility_flags  = ["nodejs_compat"]
account_id           = "5f36aa9795348ea681d0b21910dfc82a"  # HEAVEN account (noizy.ai)
workers_dev          = true

# ── Live Route — noizy.ai/* ──────────────────────────────────────────────────
routes = [
  { pattern = "noizy.ai/*", zone_name = "noizy.ai" }
]

# ── Workers AI (Edge Inference) ──────────────────────────────────────────────
# Models: @cf/meta/llama-3.1-8b-instruct (chat + summarize)
#         @cf/openai/whisper              (STT transcription)
#         @cf/stabilityai/stable-diffusion-xl-base-1.0 (image gen)
[ai]
binding = "AI"


# ── Durable Objects (NOIZYSTREAM v2) ─────────────────────────────────────────
[durable_objects]
bindings = [
  { name = "SIGNALING_ROOMS", class_name = "SignalingRoom" }
]

[[migrations]]
tag         = "v1"
new_classes = ["SignalingRoom"]

