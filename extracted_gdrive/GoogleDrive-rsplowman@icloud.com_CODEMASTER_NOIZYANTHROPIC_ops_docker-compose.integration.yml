# ═══════════════════════════════════════════════════════════════
# NOIZY EMPIRE — Full Integration Stack v2
# n8n (queue mode) + PostgreSQL + Redis + Caddy + STT
# ═══════════════════════════════════════════════════════════════
# Run:   docker compose -f ops/docker-compose.integration.yml --env-file ops/.env.integrations up -d
# Logs:  docker compose -f ops/docker-compose.integration.yml logs -f n8n
# Scale: docker compose -f ops/docker-compose.integration.yml up -d --scale n8n-worker=2
# ═══════════════════════════════════════════════════════════════
# RSP_001 | NOIZY Empire Integration Stack | 2026
# ═══════════════════════════════════════════════════════════════

x-n8n-common: &n8n-common
  image: n8nio/n8n:2.15.0
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  environment: &n8n-env
    # ── Core Config ──
    - N8N_HOST=0.0.0.0
    - N8N_PORT=5678
    - N8N_PROTOCOL=http
    - NODE_ENV=production
    - GENERIC_TIMEZONE=America/Toronto
    - N8N_DIAGNOSTICS_ENABLED=false
    - N8N_PERSONALIZATION_ENABLED=false
    - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-default-change-me-in-production}
    - N8N_USER_MANAGEMENT_JWT_SECRET=${N8N_JWT_SECRET:-}
    # ── Database: PostgreSQL ──
    - DB_TYPE=postgresdb
    - DB_POSTGRESDB_HOST=postgres
    - DB_POSTGRESDB_PORT=5432
    - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8n}
    - DB_POSTGRESDB_USER=${POSTGRES_USER:-noizy}
    - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-noizy-pg-2026}
    # ── Queue Mode: Redis ──
    - EXECUTIONS_MODE=queue
    - QUEUE_BULL_REDIS_HOST=redis
    - QUEUE_BULL_REDIS_PORT=6379
    - QUEUE_HEALTH_CHECK_ACTIVE=true
    # ── Auth ──
    - N8N_BASIC_AUTH_ACTIVE=true
    - N8N_BASIC_AUTH_USER=${N8N_USER:-noizylab}
    - N8N_BASIC_AUTH_PASSWORD=${N8N_PASS:-noizy-local-2026}
    # ── Webhooks ──
    - WEBHOOK_URL=${WEBHOOK_TUNNEL_URL:-http://localhost:5678}
    - N8N_PAYLOAD_SIZE_MAX=16
    # ── Execution settings ──
    - EXECUTIONS_DATA_PRUNE=true
    - EXECUTIONS_DATA_MAX_AGE=168
    - EXECUTIONS_DATA_SAVE_ON_ERROR=all
    - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
    - EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS=true
    # ── Integration env vars (available in n8n Code nodes) ──
    - NOTION_API_KEY=${NOTION_API_KEY:-}
    - NOTION_EVENTS_DB_ID=${NOTION_EVENTS_DB_ID:-}
    - NOTION_PROJECTS_DB_ID=${NOTION_PROJECTS_DB_ID:-}
    - NOTION_TASKS_DB_ID=${NOTION_TASKS_DB_ID:-}
    - LINEAR_API_KEY=${LINEAR_API_KEY:-}
    - LINEAR_TEAM_ID=${LINEAR_TEAM_ID:-}
    - LINEAR_WEBHOOK_SECRET=${LINEAR_WEBHOOK_SECRET:-}
    - ZAPIER_CATCH_HOOK_URL=${ZAPIER_CATCH_HOOK_URL:-}
    - ZAPIER_NOTIFICATION_HOOK=${ZAPIER_NOTIFICATION_HOOK:-}
    - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    - GITHUB_OWNER=${GITHUB_OWNER:-noizyfish}
    - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
    - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN:-}
    - CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID:-}
    - NOIZY_API_KEY=${NOIZY_API_KEY:-}
    - HEAVEN_URL=${HEAVEN_URL:-https://heaven17.rsp-5f3.workers.dev}
    - VOICE_AUTH_TOKEN=${VOICE_AUTH_TOKEN:-}
  volumes:
    - n8n_data:/home/node/.n8n
    - ${HOME}/NOIZYANTHROPIC/tools/n8n_workflows:/home/node/workflows:ro
    - ${HOME}/NOIZYANTHROPIC/lucy:/home/node/lucy-queue:ro

services:
  # ── PostgreSQL: Persistent Storage ─────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: noizy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-noizy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-noizy-pg-2026}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups/postgres:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-noizy} -d ${POSTGRES_DB:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
    networks:
      - noizy-internal

  # ── Redis: Queue Broker + Cache ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: noizy-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 60 1000
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
    networks:
      - noizy-internal

  # ── n8n Main: UI + Webhook Receiver ────────────────────────
  n8n:
    <<: *n8n-common
    container_name: noizy-n8n
    ports:
      - "127.0.0.1:5678:5678"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 2G
    networks:
      - noizy-internal
      - noizy-web
    labels:
      - "noizy.service=n8n-main"
      - "noizy.role=webhook-receiver"

  # ── n8n Worker: Queue Processor ────────────────────────────
  n8n-worker:
    <<: *n8n-common
    container_name: noizy-n8n-worker
    command: worker
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 2G
    networks:
      - noizy-internal
    labels:
      - "noizy.service=n8n-worker"
      - "noizy.role=execution-engine"

  # ── Caddy: Reverse Proxy + Auto-TLS ───────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: noizy-caddy
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
      - "127.0.0.1:8443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      n8n:
        condition: service_healthy
    networks:
      - noizy-web
    labels:
      - "noizy.service=caddy"
      - "noizy.role=reverse-proxy"

  # ── STT: Faster-Whisper Speech-to-Text ─────────────────────
  stt:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: noizy-stt
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
    networks:
      - noizy-internal

  # ── PostgreSQL Backup Cron ─────────────────────────────────
  pg-backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: noizy-pg-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
      POSTGRES_USER: ${POSTGRES_USER:-noizy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-noizy-pg-2026}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8088
    volumes:
      - ./backups/postgres:/backups
    networks:
      - noizy-internal

networks:
  noizy-internal:
    driver: bridge
    internal: true
  noizy-web:
    driver: bridge

volumes:
  n8n_data:
    driver: local
  postgres_data:
    driver: local
  hf_cache:
    driver: local
  redis_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
