name = "webhook-proxy"
main = "src/index.ts"
compatibility_date = "2026-04-01"
account_id = "5f36aa9795348ea681d0b21910dfc82a"
workers_dev = true

# Production route — uncomment when ready
# routes = [
#   { pattern = "webhooks.noizy.ai/*", zone_name = "noizy.ai" }
# ]

# KV for webhook queue
# SETUP: Run `wrangler kv namespace create WEBHOOK_QUEUE` and update the id below
# SETUP: Run `wrangler kv namespace create WEBHOOK_QUEUE --preview` and update preview_id below
[[kv_namespaces]]
binding = "WEBHOOK_QUEUE"
id = "00000000000000000000000000000001"
preview_id = "00000000000000000000000000000002"

# Secrets (set via: wrangler secret put KEY)
# NOIZY_KEY
# LINEAR_WEBHOOK_SECRET
# GITHUB_WEBHOOK_SECRET
