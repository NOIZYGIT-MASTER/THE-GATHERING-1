[project]
name = "dreamchamber-audio-mcp"
version = "1.0.0"
description = "MCP server for DreamChamber multi-AI voice collaboration — controls Loopback, Audio Hijack, and SoundSource on GOD.local"
requires-python = ">=3.10"
dependencies = [
    "mcp[cli]>=1.0.0",
    "pydantic>=2.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
