name: heaven-deploy

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "schema.sql"
      - "seed.sql"
      - "wrangler.toml"
      - ".github/workflows/heaven-deploy.yml"
  workflow_dispatch:
    inputs:
      skip_smoke:
        description: "Skip post-deploy smoke test"
        required: false
        default: false
        type: boolean

jobs:
  deploy-heaven:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── Placeholder guard ───────────────────────────────────────
      - name: Block placeholder config
        run: |
          if grep -rq 'REPLACE_WITH\|YOUR_.*_ID\|your-.*-key\|INSERT_ID_HERE' wrangler.toml; then
            echo "❌ BLOCKED: Placeholder values found in wrangler.toml"
            exit 1
          fi
          echo "✅ No placeholders in wrangler.toml"

      # ── Syntax validation ───────────────────────────────────────
      - name: Validate Worker syntax
        run: node --check src/index.js

      # ── Deploy HEAVEN ───────────────────────────────────────────
      - name: Deploy HEAVEN Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      # ── Post-deploy smoke test ──────────────────────────────────
      - name: Smoke test — health endpoint
        if: ${{ inputs.skip_smoke != 'true' }}
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://heaven.rsp-5f3.workers.dev/health)
          echo "HEAVEN /health → HTTP $STATUS"
          test "$STATUS" = "200" || exit 1

      - name: Smoke test — Gabriel status
        if: ${{ inputs.skip_smoke != 'true' }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://heaven.rsp-5f3.workers.dev/gabriel)
          echo "HEAVEN /gabriel → HTTP $STATUS"
          test "$STATUS" = "200" || exit 1

      - name: Smoke test — API v1
        if: ${{ inputs.skip_smoke != 'true' }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://heaven.rsp-5f3.workers.dev/api/v1)
          echo "HEAVEN /api/v1 → HTTP $STATUS"
          test "$STATUS" = "200" || exit 1

      # ── Proof bundle ────────────────────────────────────────────
      - name: Generate HEAVEN Proof Bundle
        run: |
          mkdir -p artifacts/proof
          node -e "
          const crypto = require('crypto');
          const fs = require('fs');
          const sha = s => crypto.createHash('sha256').update(s).digest('hex');
          const bundle = {
            proof_bundle: {
              version: '1.0',
              component: 'heaven',
              generated_at: new Date().toISOString(),
              git_sha: '${{ github.sha }}',
              git_ref: '${{ github.ref_name }}',
              run_id: '${{ github.run_id }}',
            },
            routing_contract: {
              public: ['/health', '/dashboard', '/', '/gabriel'],
              protected: ['/api/v1/*'],
              websocket: ['/ws', '/gabriel/ws'],
              auth_model: 'X-NOIZY-Key | dev-mode fallthrough if secret unset',
            },
            governance: {
              plowman_standard: '75/25 creator split (85/15 founding)',
              never_clauses: 'immutable, enforced on every synth request',
              kill_switch: 'absolute — POST /api/v1/consent-tokens/:id/revoke',
              c2pa: 'cryptographic provenance manifest on every approved synth',
            },
          };
          bundle.proof_bundle.bundle_hash = sha(JSON.stringify(bundle));
          fs.writeFileSync('artifacts/proof/heaven.production.json', JSON.stringify(bundle, null, 2));
          console.log('✅ HEAVEN proof:', bundle.proof_bundle.bundle_hash.slice(0,16));
          "

      - name: Upload Proof Bundle
        uses: actions/upload-artifact@v4
        with:
          name: noizy-proof-heaven-${{ github.sha }}
          path: artifacts/proof/heaven.production.json
          retention-days: 90
