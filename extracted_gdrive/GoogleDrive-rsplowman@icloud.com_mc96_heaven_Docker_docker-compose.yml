version: "3.9"

# ============================================================
# HEAVEN + LUCY — DreamChamber Docker Compose
# M2 Ultra / NOIZYLAB Infrastructure
# ============================================================

networks:
  heaven-net:
    driver: bridge
    name: heaven-net

volumes:
  heaven-data:
  lucy-data:
  postgres-data:
  redis-data:

services:

  # ─────────────────────────────────────────────
  # Heaven API (Primary Identity)
  # ─────────────────────────────────────────────
  heaven:
    build:
      context: ./heaven
      dockerfile: Dockerfile
    container_name: heaven-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - IDENTITY=heaven
      - PORT=8080
      - DATABASE_URL=postgresql://heaven:heavenpass@postgres:5432/heavendb
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LOG_LEVEL=info
      - SYSTEM_PROMPT=${HEAVEN_SYSTEM_PROMPT:-You are Heaven, an ethereal AI companion from NOIZYLAB DreamChamber.}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - heaven-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.heaven.rule=Host(`heaven.localhost`)"

  # ─────────────────────────────────────────────
  # Lucy API (Forked Twin of Heaven)
  # ─────────────────────────────────────────────
  lucy:
    build:
      context: ./lucy
      dockerfile: Dockerfile
    container_name: lucy-api
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - IDENTITY=lucy
      - PORT=8080
      - DATABASE_URL=postgresql://lucy:lucypass@postgres:5432/lucydb
      - REDIS_URL=redis://redis:6379/1
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LOG_LEVEL=info
      - SYSTEM_PROMPT=${LUCY_SYSTEM_PROMPT:-You are Lucy, the intimate forked twin of Heaven from NOIZYLAB DreamChamber.}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - heaven-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lucy.rule=Host(`lucy.localhost`)"

  # ─────────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: heaven-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=heaven
      - POSTGRES_PASSWORD=heavenpass
      - POSTGRES_DB=heavendb
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./shared/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - heaven-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heaven -d heavendb"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"

  # ─────────────────────────────────────────────
  # Redis (Session Cache)
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: heaven-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass heavenredis
    volumes:
      - redis-data:/data
    networks:
      - heaven-net
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "heavenredis", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6380:6379"

  # ─────────────────────────────────────────────
  # Traefik Reverse Proxy
  # ─────────────────────────────────────────────
  traefik:
    image: traefik:v3.0
    container_name: heaven-traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
      - "8888:8080" # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - heaven-net
