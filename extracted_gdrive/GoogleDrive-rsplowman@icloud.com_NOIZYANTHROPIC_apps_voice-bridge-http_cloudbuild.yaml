# ═══════════════════════════════════════════════════════════════
# Cloud Build — noizy-voice-bridge
# Triggered by: push to main, tag v*, or manual
#
# gcloud builds submit --config cloudbuild.yaml \
#   --project gen-lang-client-0531202734 \
#   apps/voice-bridge-http/
# ═══════════════════════════════════════════════════════════════

steps:
  # ── Build image ───────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - "--tag=gcr.io/$PROJECT_ID/noizy-voice-bridge:$SHORT_SHA"
      - "--tag=gcr.io/$PROJECT_ID/noizy-voice-bridge:latest"
      - "--cache-from=gcr.io/$PROJECT_ID/noizy-voice-bridge:latest"
      - "."
    dir: "apps/voice-bridge-http"

  # ── Push image ────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "--all-tags", "gcr.io/$PROJECT_ID/noizy-voice-bridge"]

  # ── Deploy to Cloud Run ───────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - noizy-voice-bridge
      - "--image=gcr.io/$PROJECT_ID/noizy-voice-bridge:$SHORT_SHA"
      - "--region=us-central1"
      - "--platform=managed"
      - "--no-allow-unauthenticated"
      - "--service-account=noizy-bridge-sa@$PROJECT_ID.iam.gserviceaccount.com"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=3"
      - "--timeout=300"
      - "--set-secrets=NOIZY_BRIDGE_TOKEN=noizy-bridge-token:latest,ANTHROPIC_API_KEY=anthropic-api-key:latest"
      - "--set-env-vars=HEAVEN_URL=https://heaven.rsp-5f3.workers.dev"

images:
  - "gcr.io/$PROJECT_ID/noizy-voice-bridge:$SHORT_SHA"
  - "gcr.io/$PROJECT_ID/noizy-voice-bridge:latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"
